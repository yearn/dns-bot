name = "dns-bot"
main = "src/index.ts"
compatibility_date = "2024-02-20"

# KV Namespace configuration
kv_namespaces = [
  { binding = "DNS_KV", id = "fd1d19aa9e2c4cabb5197368d245314b" }
]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# Cron trigger configuration (runs every minute)
[triggers]
crons = ["* * * * *"]